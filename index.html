  }

  .level-badge {

    background: #eaf3de;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .phonetic {

    display: flex;
    align-items: center;
  }
  .audio-btn:hover { color: #0c447c; }
  .divider { border: none; border-top: 1px solid #e8edf2; margin: 1.25rem 0; }
  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin-bottom: 0.4rem;
  }
  .definition {
    font-size: 1.05rem;
    line-height: 1.6;
    color: #2d3748;
    margin-bottom: 1.25rem;
  }
  .example {
    font-size: 0.95rem;
    line-height: 1.6;
    color: #4a5568;
    font-style: italic;
    background: #f7faff;
    border-left: 3px solid #85B7EB;
    padding: 0.6rem 0.9rem;
    border-radius: 0 8px 8px 0;
    margin-bottom: 1.25rem;
  }
  .vandale-link {
    font-size: 0.8rem;
    color: #185FA5;
    text-decoration: none;
  }
  .vandale-link:hover { text-decoration: underline; }

    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .btn-primary {
    flex: 1;

    background: #185FA5;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
